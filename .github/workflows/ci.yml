name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-debug:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
        !contains(github.event.head_commit.message, '[SKIP CI]')) ||
      (github.event_name == 'pull_request' &&
        !contains(github.event.pull_request.title, '[SKIP CI]') &&
        !contains(github.event.pull_request.body || '', '[SKIP CI]'))
    env:
      ORG_GRADLE_PROJECT_seslUser: ${{ secrets.SESL_USER }}
      ORG_GRADLE_PROJECT_seslToken: ${{ secrets.SESL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.SUBMODULES_TOKEN || github.token }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Go 1.25.5
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"
          check-latest: true

      - name: Cache vk-turn-proxy Go build state
        uses: actions/cache@v4
        with:
          path: |
            .gradle/vkturn/go-mod-cache
            .gradle/vkturn/go-cache
          key: ${{ runner.os }}-vkturn-go-${{ hashFiles('external/vk-turn-proxy/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-vkturn-go-

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;28.2.13676358" \
            "cmake;3.22.1"

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
